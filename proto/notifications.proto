syntax = "proto3";

package notifications;

option go_package = "github.com/myselfkunal/FlowOps/proto/gen/notifications";

message NotificationsRequest {
    string user_id = 1;
    bool success = 2;
}

message NotificationsResponse {
    bool sent = 1;
}

service NotificationsService {
    rpc SendNotifications (NotificationsRequest) returns (NotificationsResponse);
}