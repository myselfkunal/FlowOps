syntax = "proto3";

package orders;

option go_package = "github.com/myselfkunal/FlowOps/proto/gen/orders";

message OrderRequest {
    string user_id = 1;
    string item_name = 2;
    float amount = 3;
}

message OrderResponse {
    string order_id = 1;
    bool success = 2;
}

service OrderService {
    rpc CreateOrder (OrderRequest) returns (OrderResponse);
}